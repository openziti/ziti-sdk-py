name: build wheels
on:
  push:
  pull_request:

permissions:
  checks: write
  contents: read
  id-token: write

concurrency:
  group: 'build-wheels-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build_wheels:
    strategy:
      fail-fast: false
      matrix:
        ziti_version: [ 'v2.0' ]
        spec:
          - { name: 'linux x86_64', runner: ubuntu-latest }
          - { name: 'macOS x86_64', runner: macos-latest }
          - { name: 'Windows x86_64', runner: windows-latest }
    name: building ${{ matrix.spec.name }}
    runs-on: ${{ matrix.spec.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: openziti/ziti/setup-cli@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: ziti
        with:
          version: ${{ matrix.ziti_version }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          cache: 'pip'
          python-version: '3.x'

      - name: Install Python Tools
        shell: bash
        run: |
          python -m pip install -U pip setuptools
          pip install -r tests/requirements.txt
          pip install -r sample/requirements.txt

      - name: run tests
        shell: bash
        env:
          ZITI_LOG: 4
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install .
          pytest -v

      - name: upload test summary
        if: ${{ !cancelled() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: mikepenz/action-junit-report@v6
        with:
          job_summary_text: 'test results with ziti v${{ matrix.ziti_version }}'
          detailed_summary: 'true'
          include_skipped: 'true'
          check_retries: 'true'
          group_suite: 'true'
          report_paths: testdata/test-*.xml

      - name: Build distro
        run: |
          python setup.py sdist

      - uses: actions/upload-artifact@v7
        if: startsWith(matrix.spec.name, 'linux')
        with:
          name: openziiti-sdist
          path: ./dist/*

  publish:
    runs-on: ubuntu-latest
    # this step will fail on community contributed PRs
    if: github.event.pull_request.head.repo.fork == false
    needs: [ build_wheels ]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: download

      - name: check
        run: |
          ls -lR download
          mkdir dist
          cp download/* dist

      - name: Publish wheels (TestPYPI)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true
          verbose: true
          attestations: false

      - name: Publish wheels (PyPI)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true
          attestations: true
